<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrap">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1>Budget</h1>
          <p class="subtitle">Plan your gifts, track your budget</p>
        </div>
        <div class="header-btns">
          <button id="refreshBtn" class="refresh-btn" title="Pull latest changes" aria-label="Pull latest changes" style="display:none">
            <i class="ti ti-refresh"></i>
          </button>
          <button id="syncBtn" class="sync-btn" title="Sync" aria-label="Sync status">
            <i class="ti ti-cloud-off"></i>
          </button>
        </div>
      </div>
    </header>
    <div class="tabs-wrap" id="tabsWrap"></div>
    <div id="tripContent"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        reg.addEventListener('updatefound', () => {
          const sw = reg.installing;
          sw.addEventListener('statechange', () => {
            if (sw.state === 'activated' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });
    }
  </script>
</body>
</html>
